[build-system]
requires = ["hatchling", "hatch-requirements-txt>=0.3.0"]
build-backend = "hatchling.build"

[project]
name = "sagemaker"
dynamic = ["version", "optional-dependencies"]
description = "Open source library for training and deploying models on Amazon SageMaker."
readme = "README.rst"
license = "Apache-2.0"
requires-python = ">= 3.7"
authors = [
    { name = "Amazon Web Services" },
]
keywords = [
    "AI",
    "AWS",
    "Amazon",
    "ML",
    "MXNet",
    "Tensorflow",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Natural Language :: English",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
]
dependencies = [
    "attrs>=20.3.0,<23",
    "boto3>=1.26.28,<2.0",
    "google-pasta",
    "importlib-metadata>=1.4.0,<5.0",
    "numpy>=1.9.0,<2.0",
    "packaging>=20.0",
    "pandas",
    "pathos",
    "protobuf3-to-dict>=0.1.5,<1.0",
    "protobuf>=3.1,<4.0",
    "schema",
    "smdebug_rulesconfig==1.0.1",
]

[project.scripts]
sagemaker-upgrade-v2 = "sagemaker.cli.compatibility.v2.sagemaker_upgrade_v2:main"

[project.urls]
Homepage = "https://github.com/aws/sagemaker-python-sdk"

[tool.hatch.version]
path = "VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.metadata.hooks.requirements_txt.optional-dependencies]
all = [
    "requirements/extras/local_requirements.txt",
    "requirements/extras/scipy_requirements.txt",
]
local = [
    "requirements/extras/local_requirements.txt",
]
scipy = [
    "requirements/extras/scipy_requirements.txt",
]
test = [
    "requirements/extras/local_requirements.txt",
    "requirements/extras/scipy_requirements.txt",
    "requirements/extras/test_requirements.txt",
]

[tool.hatch.build.targets.sdist]
include = [
    "/requirements/extras",
    "/src",
    "/VERSION",
]

[tool.pytest.ini_options]
addopts = [
    "-vv",
]
testpaths = [
    "tests",
]
